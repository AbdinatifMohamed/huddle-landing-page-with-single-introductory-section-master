<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    .font-heading {
      font-family: "Poppins", sans-serif;
    }
    .font-body {
      font-family: "Open Sans", sans-serif;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body class="bg-[#674baf] h-screen font-body flex flex-col bg-[url(./images/bg-mobile.svg)] bg-no-repeat min-[753px]:bg-[url(./images/bg-desktop.svg)] bg-contain min-[753px]:bg-cover">

  <header class="py-7 flex px-[10%]">
    <div class="h-[2rem] w-auto min-[753px]:h-[3rem]">
      <img src="./images/logo.svg" alt="" class="h-full w-full">
    </div>
  </header>

  <main class="text-white flex-1 py-10 px-[10%]">
    <div class="flex flex-col gap-10 h-full min-[753px]:flex-row min-[753px]:items-center"> 
        <div class="min-[753px]:flex-1">
            <img src="./images/illustration-mockups.svg" alt="">
        </div>
        <div class="flex flex-col gap-5 items-center min-[753px]:flex-1 ">
            <h1 class="text-2xl font-heading text-center font-medium">Build The Community Your Fans Will Love</h1>
            <p class="text-center text-md">Huddle re-imagines the way we build communities. You have a voice, but so does your audience. 
            Create connections with your users as you engage in genuine discussion.
            </p>
            <button class="bg-white text-[#674baf] px-[50px] py-2 rounded-full mb-25 hover:bg-[#e882e8] hover:text-white shadow-lg">Register</button>
            <div class="flex flex-1 items-center justify-center gap-2 min-[753px]:self-end">
              <i class="ri-facebook-circle-fill text-3xl"></i>
              <i class="ri-twitter-fill text-3xl"></i>
              <i class="ri-instagram-fill text-3xl"></i>
            </div>
        </div>
        
      </div>
  </main>
    
  


</body>
</html>
